<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة الموزع</title>

    <link rel="stylesheet" href="css/styledash.css">
</head>
<body>
<div class="header">
  <h2>مرحبا، <span id="dealerName"></span></h2>
  <button class="logout-btn" onclick="logout()">خروج</button>
</div>

<div class="summary1">

<span id="lblUser">👤 المستخدم:</span>
<span id="selectedUser">All</span><br>

   
<span id="lblProfit">💰 إجمالي الربح:</span>
<span id="totalProfit">0</span>
<span class="currency">مانجو</span><br>

<div class="salesRow">    
<span id="lblSales">🛒 إجمالي المبيعات:</span>
<span id="totalAmount">0</span>
<span class="currency">مانجو</span><br>
</div>

<div class="salesRow">
<span id="lblOperations">🔢 إجمالي العمليات:</span>
<span id="totalCodes">0</span><br>
</div>
    
  
<span id="lblCancelled">❌ عدد الأكواد الملغية:</span>
<span id="cancelledCodes">0</span><br>

    
<div class="salesRow">
<span id="lblNet">✅ صافي الأكواد المباعة:</span>
<span id="netCodes">0</span><br>
</div>
         
<div class="salesRow">
<span id="lblSubDealer">👤 عمولة الوكيل الفرعي (25%):</span>
<span id="subDealerCommission">0</span>
<span class="currency">مانجو</span><br>
</div>
    

<span id="lblMainDealer">👑 عمولة الوكيل الرئيسي (</span><span id="mainDealerRate">0</span>%):
<span id="mainDealerCommission">0</span>
<span class="currency">مانجو</span><br>

      
<div class="salesRow">        
<span id="lblTotalCommission">💰 إجمالي العمولتين:</span>
<span id="totalCommission">0</span>
<span class="currency">مانجو</span>
</div>
    
</div>

<button id="langBtn" onclick="toggleLanguage()">English</button>
<div class="filters">
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <select id="filterUser"><option value="">اختر المستخدم</option></select>
  <button onclick="applyFilters()">تطبيق الفلترة</button>
  <button onclick="resetFilters()">إلغاء الفلترة</button>
</div>
<div class="table-container">
<table id="dataTable">
<thead>
<tr>
<th>التاريخ</th><th>المنتج</th><th>المبلغ</th>
<th>المستخدم</th><th>SN</th><th>Profit</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
<script src="js/jsdash.js"></script>
</body>
</html>
